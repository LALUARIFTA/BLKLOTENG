<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login Admin - BLK LOTENG</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔐</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-config.js"></script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-gradient {
            background: radial-gradient(circle at top right, #1e40af, #00355f);
        }
        .glass-login {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="login-gradient min-h-screen flex items-center justify-center p-6 font-body-md">
    <div class="w-full max-w-md">
        <!-- Logo Section -->
        <div class="flex flex-col items-center mb-10">
            <div class="w-16 h-16 bg-white rounded-[24px] flex items-center justify-center shadow-2xl mb-4">
                <span class="material-symbols-outlined text-primary text-4xl">school</span>
            </div>
            <h1 class="text-3xl font-black text-white tracking-tighter">BLK<span class="text-blue-300">LOTENG</span></h1>
            <p class="text-blue-100/60 text-xs font-black uppercase tracking-[0.3em] mt-2 text-center">Admin Authentication</p>
        </div>

        <!-- Login Card -->
        <div class="glass-login rounded-[40px] p-10 premium-shadow">
            <div class="mb-8">
                <h2 class="text-2xl font-black text-slate-800 tracking-tight">Selamat Datang</h2>
                <p class="text-slate-400 text-sm font-bold mt-1">Silakan masuk untuk mengelola portal</p>
            </div>

            <form id="login-form" class="space-y-6">
                <div class="group">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 group-focus-within:text-primary transition-colors">Alamat Email</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-primary transition-colors">mail</span>
                        <input type="email" id="email" required class="w-full pl-14 pr-6 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:outline-none focus:bg-white focus:border-primary/20 focus:ring-4 focus:ring-primary/5 transition-premium text-slate-800 font-semibold" placeholder="admin@vokasi.id">
                    </div>
                </div>

                <div class="group">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 group-focus-within:text-primary transition-colors">Kata Sandi</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-primary transition-colors">lock</span>
                        <input type="password" id="password" required class="w-full pl-14 pr-6 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:outline-none focus:bg-white focus:border-primary/20 focus:ring-4 focus:ring-primary/5 transition-premium text-slate-800 font-semibold" placeholder="••••••••">
                    </div>
                </div>

                <div id="error-message" class="hidden bg-red-50 text-red-500 p-4 rounded-2xl text-xs font-bold border border-red-100 flex items-center gap-3">
                    <span class="material-symbols-outlined text-sm">error</span>
                    <span id="error-text">Email atau password salah.</span>
                </div>

                <button type="submit" id="login-btn" class="w-full bg-gradient-to-r from-primary to-blue-600 text-white py-5 rounded-[24px] font-black text-sm shadow-xl shadow-blue-500/30 hover:scale-[1.02] active:scale-95 transition-premium flex items-center justify-center gap-3">
                    <span id="btn-text">Masuk ke Dashboard</span>
                    <span id="btn-loader" class="hidden animate-spin w-5 h-5 border-2 border-white border-t-transparent rounded-full"></span>
                    <span id="btn-icon" class="material-symbols-outlined text-xl">login</span>
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-slate-100 text-center">
                <a href="index.html" class="text-xs font-black text-slate-400 hover:text-primary transition-colors uppercase tracking-widest"> Kembali ke Beranda</a>
            </div>
        </div>

        <p class="text-center text-blue-100/40 text-[10px] font-bold mt-10 uppercase tracking-widest">© 2024 BLK LOTENG Security System</p>
    </div>

    <script>
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');
        const btnIcon = document.getElementById('btn-icon');
        const errorMsg = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI State Loading
            loginBtn.disabled = true;
            btnText.textContent = 'Memverifikasi...';
            btnLoader.classList.remove('hidden');
            btnIcon.classList.add('hidden');
            errorMsg.classList.add('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await client.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) throw error;

                // Success
                btnText.textContent = 'Berhasil! Mengalihkan...';
                setTimeout(() => {
                    window.location.href = 'admin/index.html';
                }, 1000);

            } catch (err) {
                console.error('Login error:', err);
                errorMsg.classList.remove('hidden');
                errorText.textContent = err.message === 'Invalid login credentials' 
                    ? 'Email atau password salah. Silakan coba lagi.' 
                    : err.message;
                
                // Reset UI State
                loginBtn.disabled = false;
                btnText.textContent = 'Masuk ke Dashboard';
                btnLoader.classList.add('hidden');
                btnIcon.classList.remove('hidden');
            }
        });

        // Check if already logged in
        async function checkSession() {
            const { data } = await client.auth.getSession();
            if (data.session) {
                window.location.href = 'admin/index.html';
            }
        }
        checkSession();
    </script>
</body>
</html>
